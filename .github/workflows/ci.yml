name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

# Node is set up BEFORE pnpm so the pnpm installer sees the right Node version.
# pnpm 11+ requires Node >= 22.13, which the runner's default Node does not satisfy.
# We use corepack (bundled with Node 22+) and the `packageManager` field in
# package.json to pin the pnpm version — no separate pnpm/action-setup action needed.

env:
  COREPACK_ENABLE_DOWNLOAD_PROMPT: "0"

jobs:
  check:
    name: Lint, audit, contamination
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"

      - name: Enable corepack
        run: |
          corepack enable
          corepack prepare --activate

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Lint skills
        run: pnpm lint

      - name: Audit skills (custom)
        run: pnpm run health

      - name: Check contamination
        run: pnpm contamination

  test:
    name: Per-skill tests
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"

      - name: Enable corepack
        run: |
          corepack enable
          corepack prepare --activate

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Run per-skill tests
        run: pnpm test
